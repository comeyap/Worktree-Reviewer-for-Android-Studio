name: Build and Package Plugin

on:
  push:
    branches: [ main, master, 'copilot/**' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    # Required so the release job can upload the packaged .zip as a Release Asset.
    # Without contents:write the default GITHUB_TOKEN is read-only and
    # softprops/action-gh-release fails with "Resource not accessible by integration".
    permissions:
      contents: write
    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java Environment (JDK 17)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Cache Gradle. The version is pinned by the project's Gradle wrapper
      #    (plugin/gradle/wrapper); IntelliJ Platform plugin 2.x requires Gradle 9+.
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: plugin

      # 4. Build and verify the IntelliJ/Android Studio plugin via the Gradle wrapper
      - name: Build Plugin
        run: ./gradlew buildPlugin
        working-directory: plugin

      # 5. Upload the compiled ZIP file in Github Actions Artifacts
      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Worktree-Reviewer-Artifact
          path: plugin/build/distributions/*.zip

      # 6. If this build was triggered by a GitHub Release, automatically upload the zip as a Release Asset
      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
